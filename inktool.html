<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ffffff">
<title>InkTool</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #fff; }
  body { font-family: "Helvetica Neue", Helvetica, system-ui, sans-serif;
         -webkit-user-select: none; user-select: none;
         -webkit-touch-callout: none; overscroll-behavior: none; }
  canvas#c, #selectOverlay {
    position: fixed; inset: auto; touch-action: none;
    border: 1px solid rgba(38, 38, 48, 0.14);
  }
  canvas#c {
    cursor: none;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06), 0 12px 40px rgba(0, 0, 0, 0.1);
  }

  #cursor { position: fixed; left: 0; top: 0; width: 10px; height: 10px;
            border: 1px solid rgba(38,38,48,.55); border-radius: 50%;
            pointer-events: none; z-index: 6; opacity: 0;
            transform: translate(-50%,-50%);
            transition: width .12s ease, height .12s ease, opacity .25s ease,
                        border-color .2s ease, background .2s ease, box-shadow .2s ease; }
  #cursor .dry-ring { position: absolute; left: 50%; top: 50%; width: calc(100% + 14px); height: calc(100% + 14px);
                      transform: translate(-50%,-50%) rotate(-90deg); border-radius: 50%; opacity: 0;
                      pointer-events: none;
                      background: conic-gradient(rgba(66,197,254,.88) calc(var(--dry-p, 0) * 360deg),
                                                   rgba(66,197,254,.12) 0);
                      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 2.5px), #000 calc(100% - 1.5px));
                      mask: radial-gradient(farthest-side, transparent calc(100% - 2.5px), #000 calc(100% - 1.5px));
                      transition: opacity .2s ease; }
  #cursor.dry-wait .dry-ring { opacity: 1; }
  #cursor.ink { border: 2px solid rgba(38,38,48,.75);
                background: var(--ink-cursor, rgba(255,73,128,.85));
                box-shadow: 0 0 0 2px #fff, 0 0 12px rgba(0,0,0,.12); }
  #cursor.fixing { border: 2px solid rgba(38,38,38,.35);
                   background: rgba(255,255,255,.92);
                   box-shadow: 0 0 0 2px #fff; }
  #cursor.fixing .dry-ring { opacity: 1;
                             background: conic-gradient(rgba(38,38,48,.35) 360deg, rgba(38,38,48,.08) 0); }
  #cursor .charge-ring { position: absolute; left: 50%; top: 50%;
                         width: calc(100% + var(--charge-extra, 0px)); height: calc(100% + var(--charge-extra, 0px));
                         transform: translate(-50%,-50%); border-radius: 50%;
                         border: 1.5px dashed rgba(38,38,48,.22); opacity: 0;
                         pointer-events: none; box-sizing: border-box; }
  #cursor.charging { transition: opacity .25s ease; }
  #cursor.charging.ink { box-shadow: 0 0 0 2px #fff, 0 0 12px rgba(0,0,0,.12); }

  #status { position: fixed; top: calc(14px + env(safe-area-inset-top)); left: 50%;
            transform: translateX(-50%); z-index: 6; pointer-events: none;
            display: flex; align-items: center; gap: 8px;
            padding: 9px 16px 9px 12px; border-radius: 999px;
            background: rgba(255,255,255,.94); box-shadow: 0 2px 14px rgba(0,0,0,.08);
            font-size: 9px; letter-spacing: .24em; text-transform: uppercase;
            color: rgba(38,38,48,.72); transition: opacity .3s ease; }
  #status .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
                 border: 1.5px solid rgba(255,255,255,.9);
                 box-shadow: 0 0 0 1px rgba(38,38,48,.12); transition: background .2s ease; }
  #status.water .dot { background: rgba(66,197,254,.55); }
  #status.ink .dot { background: var(--ink-cursor, #FF4980); }
  #status.fixing .dot { background: rgba(38,38,48,.28); }
  #status .label strong { font-weight: 600; color: rgba(38,38,48,.9); }
  #status.flash-ok { animation: statusOk .45s ease; }
  #status.flash-no { animation: statusNo .45s ease; }
  @keyframes statusOk { 0%,100%{ box-shadow: 0 2px 14px rgba(0,0,0,.08); }
    50%{ box-shadow: 0 0 0 3px rgba(66,197,254,.35), 0 2px 14px rgba(0,0,0,.08); } }
  @keyframes statusNo { 0%,100%{ box-shadow: 0 2px 14px rgba(0,0,0,.08); }
    50%{ box-shadow: 0 0 0 3px rgba(255,73,128,.35), 0 2px 14px rgba(0,0,0,.08); } }

  #hint { position: fixed; left: 50%; top: 50%; transform: translate(-50%,-50%);
          font-size: 10px; letter-spacing: .45em; text-transform: uppercase;
          color: rgba(38,38,48,.32); pointer-events: none; z-index: 5;
          transition: opacity 1.4s ease; padding-left: .45em; text-align: center; line-height: 2.2; }
  #hint.gone { opacity: 0; }

  #selectOverlay { pointer-events: none; z-index: 4; display: none; }

  #ui { position: fixed;
        bottom: calc(8px + env(safe-area-inset-bottom));
        left: 50%; transform: translateX(-50%);
        display: flex; gap: 14px; align-items: center; z-index: 7;
        padding: 10px 16px; border-radius: 9999px;
        background: #fff; box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1); }
  .tool-section { display: flex; align-items: center; }
  .tool-divider { width: 1px; align-self: stretch; min-height: 28px; margin: 2px 0;
                  background: rgba(38, 38, 48, 0.12); flex-shrink: 0; }
  .app-modes { gap: 6px; }
  .app-mode { display: flex; flex-direction: column; align-items: center; justify-content: center;
              gap: 4px; min-width: 52px; padding: 2px 6px 0;
              border: none; border-radius: 12px; background: none; cursor: pointer;
              color: rgba(38, 38, 48, 0.42); font-family: inherit;
              transition: color .15s ease, background .15s ease; }
  .app-mode svg { width: 18px; height: 18px; display: block; }
  .app-mode span { font-size: 7px; letter-spacing: .22em; text-transform: uppercase; line-height: 1; }
  .app-mode:hover { color: rgba(38, 38, 48, 0.72); }
  .app-mode.active { color: rgba(38, 38, 48, 0.88); background: rgba(38, 38, 48, 0.05); }
  .color-swatches { display: flex; gap: 10px; align-items: center; }
  .color-swatch { width: 28px; height: 28px; padding: 0;
                  border: 1px solid rgba(38, 38, 48, 0.12); border-radius: 50%;
                  cursor: pointer; flex-shrink: 0;
                  transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease; }
  .color-swatch:hover { transform: scale(1.08); }
  .color-swatch:not(.on) { opacity: 0.32; }
  .color-swatch.on { border-color: rgba(38, 38, 48, 0.85);
                     box-shadow: 0 0 0 2px #fff, 0 0 0 4px rgba(38, 38, 48, 0.2); }

  #params { position: fixed; top: 0; right: 0; bottom: 0; width: min(320px, 92vw);
            z-index: 9; background: #fff; box-shadow: -4px 0 24px rgba(0,0,0,.08);
            transform: translateX(100%); transition: transform .28s ease;
            overflow-y: auto; padding: 20px 18px calc(80px + env(safe-area-inset-bottom)); }
  #params.show { transform: translateX(0); }
  #params h2 { margin: 0 0 6px; font-size: 11px; letter-spacing: .35em; text-transform: uppercase;
               font-weight: 500; color: rgba(38,38,48,.85); }
  #params .sub { margin: 0 0 18px; font-size: 9px; letter-spacing: .12em; color: rgba(38,38,48,.38); }
  .param-group { margin-bottom: 22px; }
  .param-group h3 { margin: 0 0 10px; font-size: 9px; letter-spacing: .28em; text-transform: uppercase;
                   color: rgba(38,38,48,.55); font-weight: 500; }
  .param-row { margin-bottom: 14px; }
  .param-row label { display: block; font-size: 9px; letter-spacing: .18em; text-transform: uppercase;
                     color: rgba(38,38,48,.7); margin-bottom: 4px; }
  .param-row .help { font-size: 10px; line-height: 1.35; color: rgba(38,38,48,.42); margin-top: 4px; }
  .param-row input[type=number] { width: 100%; margin: 0; padding: 7px 9px; box-sizing: border-box;
    border: 1px solid rgba(38,38,48,.18); border-radius: 6px; background: rgba(38,38,48,.03);
    font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px;
    color: rgba(38,38,48,.88); -moz-appearance: textfield; appearance: textfield; }
  .param-row input[type=number]:focus { outline: none; border-color: rgba(38,38,48,.45);
    background: #fff; }
  .param-row input[type=number]::-webkit-outer-spin-button,
  .param-row input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .param-row.param-check label { display: flex; align-items: center; gap: 8px;
    letter-spacing: .16em; cursor: pointer; margin-bottom: 0; }
  .param-row.param-check input[type=checkbox] { width: 14px; height: 14px; margin: 0; cursor: pointer; }
  .param-row.param-check .help { margin-top: 6px; }
  input[type=range] { -webkit-appearance: none; appearance: none; height: 20px; background: transparent; cursor: pointer; }
  input[type=range]::-webkit-slider-runnable-track { height: 1px; background: rgba(38,38,48,.25); }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px;
      border-radius: 50%; background: #fff; border: 1px solid rgba(38,38,48,.6); margin-top: -5px; }
  .param-actions { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 8px; }
  .param-actions button { background: none; border: none; cursor: pointer; padding: 0;
      font-size: 9px; letter-spacing: .22em; text-transform: uppercase;
      color: rgba(38,38,48,.5); font-family: inherit; border-bottom: 1px solid transparent; }
  .param-actions button:hover { color: rgba(38,38,48,.85); border-bottom-color: rgba(38,38,48,.35); }
  .err { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
         font-size: 11px; letter-spacing: .3em; text-transform: uppercase; color: rgba(38,38,48,.5); }

  body.touch .color-swatch { width: 34px; height: 34px; }
  @media (max-width: 600px) {
    #ui { max-width: calc(100vw - 16px); flex-wrap: wrap; justify-content: center; padding: 10px 14px; }
    .tool-divider { display: none; }
    .app-modes, .color-swatches { width: 100%; justify-content: center; }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<canvas id="selectOverlay"></canvas>
<div id="cursor"><span class="charge-ring" aria-hidden="true"></span><span class="dry-ring" aria-hidden="true"></span></div>
<div id="status" class="water ink" aria-live="polite">
  <span class="dot" aria-hidden="true"></span>
  <span class="label"><strong>Ink</strong> · hold to charge</span>
</div>
<div id="hint">hold to size drop · release · pause to fix</div>
<div id="ui">
  <div class="tool-section app-modes" id="appModes">
    <button type="button" class="app-mode active" data-mode="create" aria-label="Create">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/>
      </svg>
      <span>Create</span>
    </button>
    <button type="button" class="app-mode" data-mode="communicate" aria-label="Communicate">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 11.5a8.4 8.4 0 0 1-1.9 5.3 8.5 8.5 0 0 1-6.6 3.2 8.4 8.4 0 0 1-5.3-1.9L3 21l1.9-4.2A8.4 8.4 0 0 1 3 11.5 8.5 8.5 0 0 1 12 3a8.5 8.5 0 0 1 9 8.5Z"/>
      </svg>
      <span>Communicate</span>
    </button>
    <button type="button" class="app-mode" data-mode="convene" aria-label="Convene">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="9" cy="7" r="3"/><circle cx="15" cy="7" r="3"/>
        <path d="M4.5 19c0-2.5 2-4.5 4.5-4.5"/><path d="M19.5 19c0-2.5-2-4.5-4.5-4.5"/>
        <path d="M12 14.5c2.5 0 4.5 2 4.5 4.5"/>
      </svg>
      <span>Convene</span>
    </button>
  </div>
  <div class="tool-divider" aria-hidden="true"></div>
  <div class="tool-section color-swatches" id="colorSwatches"></div>
</div>
<aside id="params" aria-hidden="true">
  <h2>Parameters</h2>
  <p class="sub">Press P to toggle · tap ↔ hold endpoints</p>
  <div class="param-group" id="paramTap"></div>
  <div class="param-group" id="paramHold"></div>
  <div class="param-group" id="paramDebug"></div>
  <div class="param-group" id="paramCanvas"></div>
  <div class="param-group" id="paramWater"></div>
  <div class="param-group" id="paramInk"></div>
  <div class="param-group" id="paramSim"></div>
  <div class="param-actions">
    <button type="button" id="bClear">clear (X)</button>
    <button type="button" id="bSave">save png</button>
    <button type="button" id="bSetDefault">set default</button>
  </div>
</aside>

<script>
'use strict';
(function(){

const canvas = document.getElementById('c');
const cursorEl = document.getElementById('cursor');
const statusEl = document.getElementById('status');
const hintEl = document.getElementById('hint');
const selectOverlay = document.getElementById('selectOverlay');
const selectCtx = selectOverlay.getContext('2d');
const paramsEl = document.getElementById('params');
const colorSwatchesEl = document.getElementById('colorSwatches');

const CANVAS_W = 1920;
const CANVAS_H = 1080;
const VIEW_PAD = { x: 0.055, y: 0.055, min: 32 };
let viewLayout = { x: 0, y: 0, w: CANVAS_W, h: CANVAS_H, scale: 1 };

function cropMargin(){
  return Math.max(0, Math.min(0.25, PARAMS.cropMargin ?? 0.015));
}

function screenToSimUv(nx, ny){
  const m = cropMargin();
  return [
    Math.max(0, Math.min(1, m + nx * (1 - 2 * m))),
    Math.max(0, Math.min(1, m + ny * (1 - 2 * m))),
  ];
}

function fitCanvas(){
  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;
}
function layoutViewport(){
  const viewW = innerWidth;
  const viewH = innerHeight;
  const padX = Math.max(VIEW_PAD.min, viewW * VIEW_PAD.x);
  const padY = Math.max(VIEW_PAD.min, viewH * VIEW_PAD.y);
  const availW = Math.max(1, viewW - padX * 2);
  const availH = Math.max(1, viewH - padY * 2);
  const scale = Math.min(availW / CANVAS_W, availH / CANVAS_H);
  const cssW = CANVAS_W * scale;
  const cssH = CANVAS_H * scale;
  viewLayout = { x: (viewW - cssW) * 0.5, y: (viewH - cssH) * 0.5, w: cssW, h: cssH, scale };
  canvas.style.width = cssW + 'px';
  canvas.style.height = cssH + 'px';
  canvas.style.left = viewLayout.x + 'px';
  canvas.style.top = viewLayout.y + 'px';
  selectOverlay.style.width = cssW + 'px';
  selectOverlay.style.height = cssH + 'px';
  selectOverlay.style.left = viewLayout.x + 'px';
  selectOverlay.style.top = viewLayout.y + 'px';
}
function fitOverlay(){
  selectOverlay.width = CANVAS_W;
  selectOverlay.height = CANVAS_H;
}
fitCanvas();
fitOverlay();

const gl = canvas.getContext('webgl2', { alpha:false, depth:false, stencil:false,
                                         antialias:false, preserveDrawingBuffer:true });
if (!gl) { document.body.innerHTML = '<div class="err">webgl2 unavailable</div>'; return; }
gl.getExtension('EXT_color_buffer_float');
gl.disable(gl.BLEND);

const TOUCH = matchMedia('(pointer: coarse)').matches || navigator.maxTouchPoints > 1;
if (TOUCH) document.body.classList.add('touch');

const PAPER_DISP = 0.013;
const PAPER_PATH = 'texturefabrik-com_paper_vol-5_07.jpg';
let paperTex = null;
let paperReady = false;
let paperSize = [1, 1];

function createPaperFallback(){
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([255, 255, 255, 255]));
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  return tex;
}

function uploadPaperTexture(img){
  if (!paperTex) paperTex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, paperTex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);
  paperSize = [img.naturalWidth || img.width, img.naturalHeight || img.height];
  paperReady = true;
}

paperTex = createPaperFallback();
const paperImg = new Image();
paperImg.onload = () => uploadPaperTexture(paperImg);
paperImg.onerror = () => { paperReady = false; };
paperImg.src = PAPER_PATH;

function paperCoverRatio(){
  if (paperSize[0] <= 1) return 1;
  const m = cropMargin();
  const cropW = CANVAS_W * (1 - 2 * m);
  const cropH = CANVAS_H * (1 - 2 * m);
  return (cropW / cropH) / (paperSize[0] / paperSize[1]);
}

function paperRawTexel(){
  return [1 / paperSize[0], 1 / paperSize[1]];
}

function bindPaper(unit){
  gl.activeTexture(gl.TEXTURE0 + unit);
  gl.bindTexture(gl.TEXTURE_2D, paperTex);
  return unit;
}

/* ---------------- PARAMS ---------------- */

const DEV_DEFAULTS_KEY = 'inktool-dev-params';

const DEFAULT_PARAMS = {
  cropMargin: 0.015,
  poolSize: 0.9,
  wetAmount: 1,
  wetSpread: 0.45,
  dryRate: 0,
  fixDelayMs: 2000,
  dropSizeTap: 4,
  dropSizeHold: 15,
  dropDensityTap: 0.1,
  dropDensityHold: 0.05,
  dropBurstTap: 0.15,
  dropBurstHold: 0.1,
  tension: 32,
  bleed: 0.36,
  flowDamp: 0.31,
  displayStrength: 1,
  vorticityScale: 0.85,
  waterVelCap: 30,
  paperTexture: 0,
};

function loadDevParams(){
  try {
    const raw = localStorage.getItem(DEV_DEFAULTS_KEY);
    if (!raw) return null;
    const saved = JSON.parse(raw);
    if (!saved || typeof saved !== 'object') return null;
    return saved;
  } catch {
    return null;
  }
}

function saveDevParams(){
  localStorage.setItem(DEV_DEFAULTS_KEY, JSON.stringify({ ...PARAMS }));
}

function migrateParams(raw){
  const p = { ...raw };
  if (p.dropSizeTap == null){
    if (p.dropSize != null){
      p.dropSizeHold = Math.max(0.1, p.dropSize * 0.38);
      p.dropSizeTap = Math.max(0.1, p.dropSize * 0.38 * 0.38);
    } else {
      p.dropSizeTap = DEFAULT_PARAMS.dropSizeTap;
      p.dropSizeHold = DEFAULT_PARAMS.dropSizeHold;
    }
  }
  if (p.dropDensityTap == null){
    if (p.dropDensity != null){
      p.dropDensityTap = p.dropDensity;
      p.dropDensityHold = Math.max(0.015, p.dropDensity * 0.16);
    } else {
      p.dropDensityTap = DEFAULT_PARAMS.dropDensityTap;
      p.dropDensityHold = DEFAULT_PARAMS.dropDensityHold;
    }
  }
  if (p.dropBurstTap == null){
    p.dropBurstTap = p.dropBurst != null ? p.dropBurst : DEFAULT_PARAMS.dropBurstTap;
    p.dropBurstHold = p.dropBurstHold != null ? p.dropBurstHold
      : (p.dropBurst != null ? Math.max(0.02, p.dropBurst * 0.4) : DEFAULT_PARAMS.dropBurstHold);
  }
  delete p.dropSize;
  delete p.dropDensity;
  delete p.dropBurst;
  if (p.fixDelayMs == null) p.fixDelayMs = DEFAULT_PARAMS.fixDelayMs;
  if (p.dryRate == null) p.dryRate = DEFAULT_PARAMS.dryRate;
  return p;
}

const PARAMS = migrateParams({ ...DEFAULT_PARAMS, ...loadDevParams() });
if (PARAMS.paperTexture == null) PARAMS.paperTexture = 0;
if (PARAMS.cropMargin == null) PARAMS.cropMargin = DEFAULT_PARAMS.cropMargin;

/* ---------------- COMMUNICATE PARAMS (dev) ---------------- */

const COMM_DEV_DEFAULTS_KEY = 'inktool-comm-params';

const COMM_DEFAULT_PARAMS = {
  lineStartSize: 10,
  lineEndSize: 20,
  lineStartDensity: 0.002,
  lineEndDensity: 0.002,
  lineSpacing: 0.006,
  flowStrength: 1000,
  flowWidth: 0.25,
  flowGrow: 1,
};

function loadCommDevParams(){
  try {
    const raw = localStorage.getItem(COMM_DEV_DEFAULTS_KEY);
    if (!raw) return null;
    const saved = JSON.parse(raw);
    if (!saved || typeof saved !== 'object') return null;
    return saved;
  } catch {
    return null;
  }
}

function saveCommDevParams(){
  localStorage.setItem(COMM_DEV_DEFAULTS_KEY, JSON.stringify({ ...COMM_PARAMS }));
}

const COMM_PARAMS = { ...COMM_DEFAULT_PARAMS, ...loadCommDevParams() };

layoutViewport();

function paperEnabled(){
  return paperReady && PARAMS.paperTexture > 0.5;
}

const PALETTE = [
  { name: 'pink', hex: '#FF4980' },
  { name: 'lavender', hex: '#F5D0FF' },
  { name: 'purple', hex: '#7E6FF9' },
  { name: 'yellow', hex: '#FAFFAD' },
  { name: 'cyan', hex: '#42C5FE' },
  { name: 'magenta', hex: '#BC5898' },
];

const SIM_BASE = 256;
const DYE_BASE = Math.min(2048, Math.min(canvas.width, canvas.height));
const PRESSURE_ITER = 18;

function hexToRgb(hex){
  return [parseInt(hex.slice(1,3),16)/255, parseInt(hex.slice(3,5),16)/255, parseInt(hex.slice(5,7),16)/255];
}
function rgbToInkAbs(r, g, b){
  const A = [r,g,b].map(v => -Math.log(Math.max(v, 0.02)));
  const m = Math.max(A[0], A[1], A[2], 0.12);
  const abs = A.map(v => v / m);
  const lum = 0.299 * r + 0.587 * g + 0.114 * b;
  const lift = Math.max(0, 0.62 - lum) * 0.85;
  const cmy = [1 - r, 1 - g, 1 - b];
  return abs.map((v, i) => v * 0.55 + cmy[i] * 0.55 + lift);
}

function smoothstep(t){
  t = Math.max(0, Math.min(1, t));
  return t * t * (3 - 2 * t);
}

function holdProgress(holdMs){
  return smoothstep((holdMs - HOLD_DEAD_MS) / (HOLD_CHARGE_MS - HOLD_DEAD_MS));
}

function holdDropParams(holdMs){
  const t = holdProgress(holdMs);
  const sizeTap = PARAMS.dropSizeTap;

  const densHold = PARAMS.dropDensityHold;

  return {
    t,

    density: densTap + t * (densHold - densTap),
    burst: burstTap + t * (burstHold - burstTap),

}

let timerPauseAccum = 0;
let timerPauseStart = 0;

function beginTimerPause(){
  if (timerPauseStart) return;
  timerPauseStart = performance.now();
}

function endTimerPause(){
  if (!timerPauseStart) return;
  timerPauseAccum += performance.now() - timerPauseStart;
  timerPauseStart = 0;
}

function appNow(){
  const wall = performance.now();
  const active = timerPauseStart ? wall - timerPauseStart : 0;
  return wall - timerPauseAccum - active;
}

function compile(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);

const quadVS = compile(gl.VERTEX_SHADER, VERT);
function program(fsSrc){
  const p = gl.createProgram();
  gl.attachShader(p, quadVS);
  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, fsSrc));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p));
  const u = {};
  for (let i = 0, n = gl.getProgramParameter(p, gl.ACTIVE_UNIFORMS); i < n; i++){
    const inf = gl.getActiveUniform(p, i);
    u[inf.name] = gl.getUniformLocation(p, inf.name);
  }
  return { p, u, bind(){ gl.useProgram(p); } };
}

function createFBO(w, h, internal, format, type, filter){
  const tex = gl.createTexture();
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, filter);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, filter);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texImage2D(gl.TEXTURE_2D, 0, internal, w, h, 0, format, type, null);
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.clearColor(0,0,0,0); gl.clear(gl.COLOR_BUFFER_BIT);
  return { tex, fbo, w, h, texel:[1/w,1/h],
    attach(u){ gl.activeTexture(gl.TEXTURE0+u); gl.bindTexture(gl.TEXTURE_2D, tex); return u; } };

}

  float R = texture(uPressure, vUv + vec2(uTexel.x,0.)).x;
  float B = texture(uPressure, vUv - vec2(0.,uTexel.y)).x;
  float T = texture(uPressure, vUv + vec2(0.,uTexel.y)).x;
  vec2 vel = texture(uVelocity, vUv).xy - 0.5 * vec2(R-L, T-B);
  o = vec4(vel, 0., 1.);
}`;

const curlFS = `#version 300 es
precision highp float; in vec2 vUv; out vec4 o;
uniform sampler2D uVelocity; uniform vec2 uTexel;
void main(){
  float L = texture(uVelocity, vUv - vec2(uTexel.x,0.)).y;
  float R = texture(uVelocity, vUv + vec2(uTexel.x,0.)).y;
  float B = texture(uVelocity, vUv - vec2(0.,uTexel.y)).x;
  float T = texture(uVelocity, vUv + vec2(0.,uTexel.y)).x;
  o = vec4(0.5 * ((R-L) - (T-B)), 0., 0., 1.);
}`;

const vorticityFS = `#version 300 es
precision highp float; in vec2 vUv; out vec4 o;
uniform sampler2D uVelocity, uCurl, uWet; uniform vec2 uTexel, uWetTexel; uniform float uCurlAmt, uDt;
void main(){
  float L = texture(uCurl, vUv - vec2(uTexel.x,0.)).x;
  float R = texture(uCurl, vUv + vec2(uTexel.x,0.)).x;
  float B = texture(uCurl, vUv - vec2(0.,uTexel.y)).x;
  float T = texture(uCurl, vUv + vec2(0.,uTexel.y)).x;
  float C = texture(uCurl, vUv).x;
  vec2 force = 0.5 * vec2(abs(T)-abs(B), abs(R)-abs(L));
  force /= length(force) + 1e-4;
  force *= uCurlAmt * C * vec2(1., -1.);

  float wL = texture(uWet, vUv - vec2(uWetTexel.x, 0.)).x;
  float wR = texture(uWet, vUv + vec2(uWetTexel.x, 0.)).x;
  float wB = texture(uWet, vUv - vec2(0., uWetTexel.y)).x;
  float wT = texture(uWet, vUv + vec2(0., uWetTexel.y)).x;
  float edge = smoothstep(0.04, 0.22, length(vec2(wR - wL, wT - wB)));
  force *= (1.0 - edge * 0.92);

  vec2 vel = texture(uVelocity, vUv).xy + force * uDt;
  o = vec4(clamp(vel, -800., 800.), 0., 1.);
}`;

const edgeRestrainVelFS = `#version 300 es
precision highp float; in vec2 vUv; out vec4 o;
uniform sampler2D uVelocity, uWet; uniform vec2 uWetTexel;
void main(){
  vec2 vel = texture(uVelocity, vUv).xy;
  float w = texture(uWet, vUv).x;
  float wL = texture(uWet, vUv - vec2(uWetTexel.x, 0.)).x;
  float wR = texture(uWet, vUv + vec2(uWetTexel.x, 0.)).x;
  float wB = texture(uWet, vUv - vec2(0., uWetTexel.y)).x;
  float wT = texture(uWet, vUv + vec2(0., uWetTexel.y)).x;
  vec2 gradW = vec2(wR - wL, wT - wB);
  float gLen = length(gradW);
  float edge = smoothstep(0.04, 0.22, gLen);
  float presence = smoothstep(0.004, 0.16, w);

  if (gLen > 1e-5){
    vec2 gn = gradW / gLen;
    vel -= gn * dot(vel, gn) * edge * 0.97;
    vec2 tangent = vel - gn * dot(vel, gn);
    vel -= tangent * edge * 0.78;
  }
  vel *= presence * (1.0 - edge * 0.62);
  o = vec4(vel, 0., 1.);
}`;

const displayFS = `#version 300 es
precision highp float; in vec2 vUv; out vec4 o;
uniform sampler2D uInk, uFixedInk, uPaper;
uniform vec2 uTexel; uniform float uInkStrength, uEdge;
uniform float uPaperCoverRatio, uPaperReady, uCropMargin;
float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
vec2 simUv(vec2 uv){
  float m = uCropMargin;
  return vec2(m) + uv * (1.0 - 2.0 * m);
}
vec2 paperUv(vec2 cropUv){
  vec2 st = cropUv;
  if (uPaperCoverRatio > 1.0) st.y = (st.y - 0.5) / uPaperCoverRatio + 0.5;
  else st.x = (st.x - 0.5) * uPaperCoverRatio + 0.5;
  return st;
}
void main(){
  vec2 suv = simUv(vUv);
  float simScale = max(1.0 - 2.0 * uCropMargin, 0.01);
  vec2 st = uTexel / simScale;
  vec3 pA = texture(uInk, suv).rgb;
  vec3 pF = texture(uFixedInk, suv).rgb;
  vec3 p = pF + pA;
  float l = dot(texture(uFixedInk, suv - vec2(st.x,0.)).rgb + texture(uInk, suv - vec2(st.x,0.)).rgb, vec3(1.));
  float r = dot(texture(uFixedInk, suv + vec2(st.x,0.)).rgb + texture(uInk, suv + vec2(st.x,0.)).rgb, vec3(1.));
  float b = dot(texture(uFixedInk, suv - vec2(0.,st.y)).rgb + texture(uInk, suv - vec2(0.,st.y)).rgb, vec3(1.));
  float t = dot(texture(uFixedInk, suv + vec2(0.,st.y)).rgb + texture(uInk, suv + vec2(0.,st.y)).rgb, vec3(1.));
  float c = dot(p, vec3(1.));
  float lap = (l + r + b + t) * 0.25 - c;
  p *= 1.0 + max(lap, 0.0) * 0.95;
  float edge = length(vec2(r-l, t-b));
  float edgeGrain = hash(suv * vec2(1920., 1080.) * 1.7) * 0.22;
  vec3 inkLayer = exp(-p * uInkStrength * (1.0 + edge * uEdge * (0.65 + edgeGrain)));
  vec3 paper = mix(vec3(1.0), texture(uPaper, paperUv(vUv)).rgb, uPaperReady);
  o = vec4(paper * inkLayer, 1.0);
}`;

const copyInkFS = `#version 300 es
precision highp float; in vec2 vUv; out vec4 o;
uniform sampler2D uSource;
void main(){ o = vec4(texture(uSource, vUv).rgb, 1.0); }`;

const progSplat = program(splatFS);
const progInkDropSplat = program(inkDropSplatFS);
const progRadialVel = program(radialVelFS);
const progLineFlow = program(lineFlowFS);
const progCircleMask = program(circleMaskFS);
const progFillFromMask = program(fillFromMaskFS);
const progAmbientFromMask = program(ambientFromMaskFS);
const progAdvVel = program(advectVelFS);
const progAdvWet = program(advectWetFS);
const progAdvInk = program(advectInkFS);
const progDiv = program(divergenceFS);
const progPressure = program(pressureFS);
const progGradSub = program(gradSubFS);
const progCurl = program(curlFS);
const progVort = program(vorticityFS);
const progEdgeRestrain = program(edgeRestrainVelFS);
const progCopyInk = program(copyInkFS);
const progDisplay = program(displayFS);

const HF = gl.HALF_FLOAT;
let velocity, divergence, curl, pressure, ink, fixedInk, wet, selectionMask;
let applyingWater = false;

function initTargets(){
  const sim = getRes(SIM_BASE), dye = getRes(DYE_BASE);
  velocity = createDouble(sim.w, sim.h, gl.RG16F, gl.RG, HF, gl.LINEAR);
  divergence = createFBO(sim.w, sim.h, gl.R16F, gl.RED, HF, gl.NEAREST);
  curl = createFBO(sim.w, sim.h, gl.R16F, gl.RED, HF, gl.NEAREST);
  pressure = createDouble(sim.w, sim.h, gl.R16F, gl.RED, HF, gl.NEAREST);
  ink = createDouble(dye.w, dye.h, gl.RGBA16F, gl.RGBA, HF, gl.LINEAR);
  fixedInk = createFBO(dye.w, dye.h, gl.RGBA16F, gl.RGBA, HF, gl.LINEAR);
  wet = createDouble(dye.w, dye.h, gl.R16F, gl.RED, HF, gl.LINEAR);

}
initTargets();
fillCanvasWet();

window.addEventListener('resize', () => {
  layoutViewport();
});

function fillCanvasWet(amount){
  const w = amount == null ? PARAMS.wetAmount : amount;
  for (const f of [wet.read, wet.write]){
    gl.bindFramebuffer(gl.FRAMEBUFFER, f.fbo);
    gl.viewport(0, 0, f.w, f.h);

    gl.clear(gl.COLOR_BUFFER_BIT);

}

function clearVelocity(){

    for (const f of [d.read, d.write]){

function beginFixing(){

function bakeInkToFixed(){

function splat(target, x, y, r, c, useMax, hole){
  const f = target.read;
  gl.bindFramebuffer(gl.FRAMEBUFFER, f.fbo);
  gl.viewport(0, 0, f.w, f.h);
  const ex = Math.ceil(r * 4.5 * f.h) + 2;
  const cx = Math.round(x * f.w), cy = Math.round(y * f.h);
  gl.enable(gl.SCISSOR_TEST);
  gl.scissor(Math.max(cx-ex,0), Math.max(cy-ex,0), ex*2, ex*2);
  gl.enable(gl.BLEND);
  if (useMax) gl.blendEquation(gl.MAX);
  else { gl.blendEquation(gl.FUNC_ADD); gl.blendFunc(gl.ONE, gl.ONE); }
  progSplat.bind();
  gl.uniform1f(progSplat.u.uAspect, canvas.width / canvas.height);
  gl.uniform2f(progSplat.u.uPoint, x, y);
  gl.uniform4f(progSplat.u.uColor, c[0], c[1], c[2], c[3]);
  gl.uniform1f(progSplat.u.uRadius, r * r);
  gl.uniform1f(progSplat.u.uHole, hole || 0);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  gl.blendEquation(gl.FUNC_ADD);
  gl.disable(gl.BLEND);
  gl.disable(gl.SCISSOR_TEST);
}

function inkDropSplat(target, x, y, r, c){
  const f = target.read;
  gl.bindFramebuffer(gl.FRAMEBUFFER, f.fbo);
  gl.viewport(0, 0, f.w, f.h);
  const ex = Math.ceil(r * 5.2 * f.h) + 3;
  const cx = Math.round(x * f.w), cy = Math.round(y * f.h);
  gl.enable(gl.SCISSOR_TEST);
  gl.scissor(Math.max(cx-ex,0), Math.max(cy-ex,0), ex*2, ex*2);
  gl.enable(gl.BLEND);
  gl.blendEquation(gl.FUNC_ADD);
  gl.blendFunc(gl.ONE, gl.ONE);
  progInkDropSplat.bind();
  gl.uniform1f(progInkDropSplat.u.uAspect, canvas.width / canvas.height);
  gl.uniform2f(progInkDropSplat.u.uPoint, x, y);
  gl.uniform4f(progInkDropSplat.u.uColor, c[0], c[1], c[2], c[3]);
  gl.uniform1f(progInkDropSplat.u.uRadius, r * r);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  gl.blendEquation(gl.FUNC_ADD);
  gl.disable(gl.BLEND);
  gl.disable(gl.SCISSOR_TEST);
}

function radialVelBurst(x, y, radius, strength){
  const f = velocity.read;
  gl.bindFramebuffer(gl.FRAMEBUFFER, f.fbo);
  gl.viewport(0, 0, f.w, f.h);
  const ex = Math.ceil(radius * 5 * f.h) + 3;
  const cx = Math.round(x * f.w), cy = Math.round(y * f.h);
  gl.enable(gl.SCISSOR_TEST);
  gl.scissor(Math.max(cx-ex,0), Math.max(cy-ex,0), ex*2, ex*2);
  gl.enable(gl.BLEND);
  gl.blendEquation(gl.FUNC_ADD);
  gl.blendFunc(gl.ONE, gl.ONE);
  progRadialVel.bind();
  gl.uniform1i(progRadialVel.u.uWet, wet.read.attach(0));
  gl.uniform1f(progRadialVel.u.uAspect, canvas.width / canvas.height);
  gl.uniform2f(progRadialVel.u.uPoint, x, y);
  gl.uniform1f(progRadialVel.u.uRadius, radius * radius);
  gl.uniform1f(progRadialVel.u.uStrength, strength);
  gl.uniform2f(progRadialVel.u.uWetTexel, wet.texel[0], wet.texel[1]);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  gl.disable(gl.BLEND);
  gl.disable(gl.SCISSOR_TEST);
}

function brushRadius(){
  const t = (PARAMS.poolSize - 0.2) / 0.7;
  return 0.028 + t * 0.082;
}

function brushRadiusPx(){
  return brushRadius() * viewLayout.h;
}

function clearSelectionMask(){
  gl.bindFramebuffer(gl.FRAMEBUFFER, selectionMask.fbo);
  gl.viewport(0, 0, selectionMask.w, selectionMask.h);
  gl.clearColor(0, 0, 0, 0);
  gl.clear(gl.COLOR_BUFFER_BIT);
}

function stampCircleMask(x, y){
  const r = brushRadius();
  const rr = r * r;
  const f = selectionMask;
  gl.bindFramebuffer(gl.FRAMEBUFFER, f.fbo);
  gl.viewport(0, 0, f.w, f.h);
  const ex = Math.ceil(r * 4.5 * f.h) + 2;
  const cx = Math.round(x * f.w), cy = Math.round(y * f.h);
  gl.enable(gl.SCISSOR_TEST);
  gl.scissor(Math.max(cx - ex, 0), Math.max(cy - ex, 0), ex * 2, ex * 2);
  gl.enable(gl.BLEND);
  gl.blendEquation(gl.MAX);
  gl.blendFunc(gl.ONE, gl.ONE);
  progCircleMask.bind();
  gl.uniform1f(progCircleMask.u.uAspect, canvas.width / canvas.height);
  gl.uniform2f(progCircleMask.u.uPoint, x, y);
  gl.uniform1f(progCircleMask.u.uRadius, rr);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  gl.blendEquation(gl.FUNC_ADD);
  gl.disable(gl.BLEND);
  gl.disable(gl.SCISSOR_TEST);
}

function drawStampPreview(x, y){
  const [sx, sy] = [x * innerWidth, (1 - y) * innerHeight];
  const pr = brushRadiusPx();
  selectCtx.beginPath();
  selectCtx.arc(sx, sy, pr, 0, Math.PI * 2);
  selectCtx.fillStyle = 'rgba(66,197,254,0.08)';
  selectCtx.fill();
  selectCtx.setLineDash([5, 7]);
  selectCtx.strokeStyle = 'rgba(66,197,254,0.55)';
  selectCtx.lineWidth = 1.5;
  selectCtx.stroke();
  selectCtx.setLineDash([]);
}

function showSelectOverlay(){
  selectOverlay.style.display = 'block';
}

function hideSelectOverlay(){
  selectOverlay.style.display = 'none';
  selectCtx.clearRect(0, 0, selectOverlay.width, selectOverlay.height);
}

function stampBrushAt(x, y){
  stampCircleMask(x, y);
  drawStampPreview(x, y);
}

function stampBrushAlong(x0, y0, x1, y1){
  const r = brushRadius();
  const spacing = r * 0.52;
  const dist = Math.hypot(x1 - x0, y1 - y0);
  const steps = Math.max(1, Math.ceil(dist / spacing));
  for (let i = 0; i <= steps; i++){
    const t = steps === 0 ? 0 : i / steps;
    stampBrushAt(x0 + (x1 - x0) * t, y0 + (y1 - y0) * t);
  }
}

function blitFullMask(target, prog, extraUniforms, useMax){
  const f = target.read;
  gl.bindFramebuffer(gl.FRAMEBUFFER, f.fbo);
  gl.viewport(0, 0, f.w, f.h);
  gl.enable(gl.BLEND);
  if (useMax) gl.blendEquation(gl.MAX);
  else { gl.blendEquation(gl.FUNC_ADD); gl.blendFunc(gl.ONE, gl.ONE); }
  prog.bind();
  gl.uniform1i(prog.u.uMask, selectionMask.attach(0));
  if (extraUniforms) extraUniforms(prog);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  gl.blendEquation(gl.FUNC_ADD);
  gl.disable(gl.BLEND);
}

function commitWaterSelection(){
  applyingWater = true;
  const feather = 0.08 + PARAMS.wetSpread * 0.35;
  blitFullMask(wet, progFillFromMask, p => {
    gl.uniform1f(p.u.uAmount, PARAMS.wetAmount);
    gl.uniform1f(p.u.uFeather, feather);
  }, true);
  ambientPhase += 1.7;
  const strength = 8 + (1 - PARAMS.flowDamp) * 14 + PARAMS.vorticityScale * 10;
  blitFullMask(velocity, progAmbientFromMask, p => {
    gl.uniform1f(p.u.uAspect, canvas.width / canvas.height);
    gl.uniform1f(p.u.uStrength, strength);
    gl.uniform1f(p.u.uPhase, ambientPhase);
  }, false);
  blitFullMask(velocity, progAmbientFromMask, p => {
    gl.uniform1f(p.u.uAspect, canvas.width / canvas.height);
    gl.uniform1f(p.u.uStrength, PARAMS.waterVelCap * 0.2);
    gl.uniform1f(p.u.uPhase, ambientPhase + 2.1);
  }, false);
  clearSelectionMask();
  hideSelectOverlay();
}

function nextDropColorIdx(){
  if (!enabledColors.length) return 0;
  const idx = enabledColors[dropColorIdx % enabledColors.length];
  dropColorIdx++;
  return idx;
}

function peekNextDropColor(){
  if (!enabledColors.length) return PALETTE[0].hex;
  return PALETTE[enabledColors[dropColorIdx % enabledColors.length]].hex;
}

function dropPulse(){
  if (!activeDrop.on) return 0;
  const now = appNow();
  if (now >= activeDrop.until){
    activeDrop.on = false;
    return 0;
  }
  return (activeDrop.until - now) / DROP_SETTLE_MS;
}

function injectDropMotion(x, y, dropR, initial, burst){
  if (!initial) return;
  const burstR = Math.max(dropR * 3.4, 0.014);
  const strength = burst * 185;
  radialVelBurst(x, y, burstR, strength);
}

function depositInkDrop(x, y, holdMs){
  if (!enabledColors.length || sessionState !== 'composing') return false;
  const { size, density, burst } = holdDropParams(holdMs == null ? 0 : holdMs);
  const ci = nextDropColorIdx();
  const [r,g,b] = hexToRgb(PALETTE[ci].hex);
  const abs = rgbToInkAbs(r,g,b);
  const dens = density * 4.5;
  const dr = 0.004 + size * 0.011;
  inkDropSplat(ink, x, y, dr, [abs[0]*dens, abs[1]*dens, abs[2]*dens, 0]);
  const now = appNow();
  activeDrop = { x, y, on: true, until: now + DROP_SETTLE_MS, radius: Math.sqrt(dr) };
  injectDropMotion(x, y, Math.sqrt(dr), true, burst);
  dropCount++;
  lastDropAt = now;
  updatePhaseUI();
  return true;
}

/* ---------------- COMMUNICATE (line) ---------------- */

function injectLineFlow(ax, ay, bx, by){
  const f = velocity.read;
  gl.bindFramebuffer(gl.FRAMEBUFFER, f.fbo);
  gl.viewport(0, 0, f.w, f.h);
  gl.enable(gl.BLEND);
  gl.blendEquation(gl.FUNC_ADD);
  gl.blendFunc(gl.ONE, gl.ONE);
  progLineFlow.bind();
  gl.uniform1i(progLineFlow.u.uWet, wet.read.attach(0));
  gl.uniform1f(progLineFlow.u.uAspect, canvas.width / canvas.height);
  gl.uniform2f(progLineFlow.u.uA, ax, ay);
  gl.uniform2f(progLineFlow.u.uB, bx, by);
  gl.uniform1f(progLineFlow.u.uWidth, COMM_PARAMS.flowWidth);
  gl.uniform1f(progLineFlow.u.uStrength, COMM_PARAMS.flowStrength);
  gl.uniform1f(progLineFlow.u.uGrow, COMM_PARAMS.flowGrow);
  gl.uniform2f(progLineFlow.u.uWetTexel, wet.texel[0], wet.texel[1]);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  gl.blendEquation(gl.FUNC_ADD);
  gl.disable(gl.BLEND);
}

function gradientColor(t){
  if (!enabledColors.length) return [0, 0, 0];
  const cols = enabledColors.map(i => hexToRgb(PALETTE[i].hex));
  if (cols.length === 1) return cols[0];
  const seg = Math.max(0, Math.min(1, t)) * (cols.length - 1);
  const i = Math.min(cols.length - 2, Math.floor(seg));
  const f = seg - i;
  return [
    cols[i][0] + (cols[i + 1][0] - cols[i][0]) * f,
    cols[i][1] + (cols[i + 1][1] - cols[i][1]) * f,
    cols[i][2] + (cols[i + 1][2] - cols[i][2]) * f,
  ];
}

function drawCommunicateLine(ax, ay, bx, by){
  if (!enabledColors.length || sessionState !== 'composing') return false;
  const dist = Math.hypot(bx - ax, by - ay);
  const spacing = Math.max(0.002, COMM_PARAMS.lineSpacing);
  const steps = Math.max(1, Math.ceil(dist / spacing));
  for (let s = 0; s <= steps; s++){
    const t = s / steps;
    const x = ax + (bx - ax) * t;
    const y = ay + (by - ay) * t;
    const size = COMM_PARAMS.lineStartSize + (COMM_PARAMS.lineEndSize - COMM_PARAMS.lineStartSize) * t;
    const density = COMM_PARAMS.lineStartDensity + (COMM_PARAMS.lineEndDensity - COMM_PARAMS.lineStartDensity) * t;
    const [r, g, b] = gradientColor(t);
    const abs = rgbToInkAbs(r, g, b);
    const dens = density * 4.5;
    const dr = 0.004 + Math.max(0, size) * 0.011;
    inkDropSplat(ink, x, y, dr, [abs[0] * dens, abs[1] * dens, abs[2] * dens, 0]);
  }
  injectLineFlow(ax, ay, bx, by);
  applyingWater = true;
  const now = appNow();
  const dr = 0.004 + Math.max(0, COMM_PARAMS.lineEndSize) * 0.011;
  activeDrop = { x: bx, y: by, on: true, until: now + DROP_SETTLE_MS, radius: Math.sqrt(dr) };
  dropCount++;
  lastDropAt = now;
  updatePhaseUI();
  return true;
}

function drawCommPreview(ax, ay, bx, by){
  const W = selectOverlay.width, H = selectOverlay.height;
  selectCtx.clearRect(0, 0, W, H);
  const m = cropMargin();
  const span = Math.max(1 - 2 * m, 0.001);
  const toPx = (x, y) => [((x - m) / span) * W, (1 - (y - m) / span) * H];
  const [ax2, ay2] = toPx(ax, ay);
  const [bx2, by2] = toPx(bx, by);
  selectCtx.setLineDash([10, 12]);
  selectCtx.strokeStyle = 'rgba(66,197,254,0.7)';
  selectCtx.lineWidth = 3;
  selectCtx.beginPath();
  selectCtx.moveTo(ax2, ay2);
  selectCtx.lineTo(bx2, by2);
  selectCtx.stroke();
  selectCtx.setLineDash([]);
  selectCtx.fillStyle = 'rgba(66,197,254,0.9)';
  selectCtx.beginPath(); selectCtx.arc(ax2, ay2, 7, 0, Math.PI * 2); selectCtx.fill();
  selectCtx.beginPath(); selectCtx.arc(bx2, by2, 13, 0, Math.PI * 2); selectCtx.fill();
}

function handleCommunicateClick(x, y){
  if (sessionState !== 'composing') return;
  if (!commAnchor.set){
    commAnchor = { x, y, set: true };
    showSelectOverlay();
    drawCommPreview(x, y, x, y);
    flashStatus('ok');
  } else {
    const ok = drawCommunicateLine(commAnchor.x, commAnchor.y, x, y);
    commAnchor = { x: 0, y: 0, set: false };
    hideSelectOverlay();
    flashStatus(ok ? 'ok' : 'no');
  }
}

function flashStatus(kind){
  statusEl.classList.remove('flash-ok', 'flash-no');
  void statusEl.offsetWidth;
  statusEl.classList.add(kind === 'ok' ? 'flash-ok' : 'flash-no');
}

function dryWaitProgress(now){
  if (sessionState !== 'composing' || dropCount < 1) return 0;
  return Math.min(1, (now - lastDropAt) / idleToFixMs());
}

function updatePhaseUI(){
  const inkHex = peekNextDropColor();
  document.documentElement.style.setProperty('--ink-cursor', inkHex);
  statusEl.classList.remove('water', 'ink', 'fixing');
  const label = statusEl.querySelector('.label');
  if (sessionState === 'fixing'){
    statusEl.classList.add('fixing');
    label.innerHTML = '<strong>Fixing</strong> · drying on paper';
  } else {
    statusEl.classList.add('water', 'ink');
    const now = appNow();
    const wait = dryWaitProgress(now);
    if (dropCount > 0 && wait > 0.02 && !simPausedForHold()){
      const secs = Math.max(0, (idleToFixMs() - (now - lastDropAt)) / 1000).toFixed(1);
      label.innerHTML = '<strong>Ink</strong> · <strong>Wet</strong> · fixing in ' + secs + 's';
    } else if (simPausedForHold()){
      label.innerHTML = '<strong>Ink</strong> · <strong>Wet</strong> · charging…';
    } else {
      label.innerHTML = '<strong>Ink</strong> · <strong>Wet</strong> · hold to charge';
    }
  }
}

function step(dt){
  const now = appNow();
  if (sessionState === 'composing' && dropCount > 0 && now - lastDropAt >= idleToFixMs()){
    beginFixing();
  }
  if (sessionState === 'fixing' && now - fixingStartedAt >= FIX_DURATION_MS){
    finishFixing();
  }

  const fixing = sessionState === 'fixing';
  const damp = fixing
    ? Math.exp(-dt * 22)
    : activeDrop.on
      ? Math.exp(-dt * (2.5 + (1 - PARAMS.flowDamp) * 4))
      : Math.exp(-dt * 16);
  progAdvVel.bind();
  gl.uniform1i(progAdvVel.u.uVelocity, velocity.read.attach(0));
  gl.uniform1i(progAdvVel.u.uWet, wet.read.attach(1));
  gl.uniform2f(progAdvVel.u.uTexel, velocity.texel[0], velocity.texel[1]);
  gl.uniform2f(progAdvVel.u.uWetTexel, wet.texel[0], wet.texel[1]);
  gl.uniform1f(progAdvVel.u.uDt, dt);
  gl.uniform1f(progAdvVel.u.uDissipation, damp);
  blit(velocity.write); velocity.swap();

  const curlAmt = fixing ? 0 : applyingWater ? (4 + PARAMS.flowDamp * 14) * PARAMS.vorticityScale : 0;
  progCurl.bind();
  gl.uniform1i(progCurl.u.uVelocity, velocity.read.attach(0));
  gl.uniform2f(progCurl.u.uTexel, velocity.texel[0], velocity.texel[1]);
  blit(curl);
  progVort.bind();
  gl.uniform1i(progVort.u.uVelocity, velocity.read.attach(0));
  gl.uniform1i(progVort.u.uCurl, curl.attach(1));
  gl.uniform1i(progVort.u.uWet, wet.read.attach(2));
  gl.uniform2f(progVort.u.uTexel, velocity.texel[0], velocity.texel[1]);
  gl.uniform2f(progVort.u.uWetTexel, wet.texel[0], wet.texel[1]);
  gl.uniform1f(progVort.u.uCurlAmt, curlAmt);
  gl.uniform1f(progVort.u.uDt, dt);
  blit(velocity.write); velocity.swap();
  applyingWater = false;

  progDiv.bind();
  gl.uniform1i(progDiv.u.uVelocity, velocity.read.attach(0));
  gl.uniform2f(progDiv.u.uTexel, velocity.texel[0], velocity.texel[1]);
  blit(divergence);
  progPressure.bind();
  gl.uniform1i(progPressure.u.uDivergence, divergence.attach(1));
  gl.uniform2f(progPressure.u.uTexel, velocity.texel[0], velocity.texel[1]);
  for (let i = 0; i < PRESSURE_ITER; i++){
    gl.uniform1i(progPressure.u.uPressure, pressure.read.attach(0));
    blit(pressure.write); pressure.swap();
  }
  progGradSub.bind();
  gl.uniform1i(progGradSub.u.uPressure, pressure.read.attach(0));
  gl.uniform1i(progGradSub.u.uVelocity, velocity.read.attach(1));
  gl.uniform2f(progGradSub.u.uTexel, velocity.texel[0], velocity.texel[1]);
  blit(velocity.write); velocity.swap();

  progEdgeRestrain.bind();
  gl.uniform1i(progEdgeRestrain.u.uVelocity, velocity.read.attach(0));
  gl.uniform1i(progEdgeRestrain.u.uWet, wet.read.attach(1));
  gl.uniform2f(progEdgeRestrain.u.uWetTexel, wet.texel[0], wet.texel[1]);
  blit(velocity.write); velocity.swap();

  let wetDecay = 1.0;
  if (PARAMS.dryRate > 0){
    if (fixing) wetDecay = Math.exp(-dt / FIX_DRY_TAU);
    else if (dropCount > 0){
      const dryTau = 2 + (1 - PARAMS.dryRate) * 14;
      wetDecay = Math.exp(-dt / dryTau);
    }
  }
  progAdvWet.bind();
  gl.uniform1i(progAdvWet.u.uVelocity, velocity.read.attach(0));
  gl.uniform1i(progAdvWet.u.uWet, wet.read.attach(1));
  gl.uniform2f(progAdvWet.u.uTexel, velocity.texel[0], velocity.texel[1]);
  gl.uniform2f(progAdvWet.u.uSrcTexel, wet.texel[0], wet.texel[1]);
  gl.uniform1f(progAdvWet.u.uDt, dt);
  gl.uniform1f(progAdvWet.u.uDecay, wetDecay);
  gl.uniform1f(progAdvWet.u.uSpread, fixing ? PARAMS.wetSpread * 0.12 : PARAMS.wetSpread);
  blit(wet.write); wet.swap();

  if (!fixing){
    progAdvInk.bind();
    gl.uniform1i(progAdvInk.u.uVelocity, velocity.read.attach(0));
    gl.uniform1i(progAdvInk.u.uSource, ink.read.attach(1));
    gl.uniform1i(progAdvInk.u.uWet, wet.read.attach(2));
    gl.uniform1i(progAdvInk.u.uPaper, bindPaper(3));
    gl.uniform2f(progAdvInk.u.uTexel, velocity.texel[0], velocity.texel[1]);
    gl.uniform2f(progAdvInk.u.uSrcTexel, ink.texel[0], ink.texel[1]);
    gl.uniform2f(progAdvInk.u.uPaperTexel, paperRawTexel()[0], paperRawTexel()[1]);
    gl.uniform1f(progAdvInk.u.uDt, dt);
    gl.uniform1f(progAdvInk.u.uBleed, PARAMS.bleed);
    gl.uniform1f(progAdvInk.u.uAspect, canvas.width / canvas.height);
    gl.uniform1f(progAdvInk.u.uTension, PARAMS.tension);
    gl.uniform1f(progAdvInk.u.uPaperCoverRatio, paperCoverRatio());
    gl.uniform1f(progAdvInk.u.uPaperDisp, PAPER_DISP);
    gl.uniform1f(progAdvInk.u.uPaperLoaded, paperReady ? 1 : 0);
    gl.uniform1f(progAdvInk.u.uCropMargin, cropMargin());
    gl.uniform2f(progAdvInk.u.uDropCenter, activeDrop.x, activeDrop.y);
    gl.uniform1f(progAdvInk.u.uDropActive, activeDrop.on ? 1 : 0);
    gl.uniform1f(progAdvInk.u.uDropPulse, dropPulse());
    gl.uniform1f(progAdvInk.u.uDropRadius, activeDrop.radius);
    blit(ink.write); ink.swap();
  }
}

function render(){
  progDisplay.bind();
  gl.uniform1i(progDisplay.u.uInk, ink.read.attach(0));
  gl.uniform1i(progDisplay.u.uFixedInk, fixedInk.attach(1));
  gl.uniform1i(progDisplay.u.uPaper, bindPaper(2));
  gl.uniform2f(progDisplay.u.uTexel, ink.texel[0], ink.texel[1]);
  gl.uniform1f(progDisplay.u.uInkStrength, PARAMS.displayStrength);
  gl.uniform1f(progDisplay.u.uEdge, 2.15);
  gl.uniform1f(progDisplay.u.uPaperCoverRatio, paperCoverRatio());
  gl.uniform1f(progDisplay.u.uPaperReady, paperEnabled() ? 1 : 0);
  gl.uniform1f(progDisplay.u.uCropMargin, cropMargin());
  blit(null);
}

const ptr = {
  down: false, tx: 0.5, ty: 0.5, bx: 0.5, by: 0.5,
  sx: 0.5, sy: 0.5, speed: 0, simP: 0.35,
  force: 0, hasForce: false, forceT: 0,
  cx: 0, cy: 0, inWindow: false, type: 'mouse',
  holdStart: 0,
};
let activePointerId = null;
let strokes = 0;

function simPausedForHold(){
  return ptr.down && sessionState === 'composing' && appMode !== 'communicate';
}

function toUv(e){
  const nx = Math.max(0, Math.min(1, (e.clientX - viewLayout.x) / viewLayout.w));
  const ny = Math.max(0, Math.min(1, 1 - (e.clientY - viewLayout.y) / viewLayout.h));
  return screenToSimUv(nx, ny);
}
function pointerInCanvas(e){
  return e.clientX >= viewLayout.x && e.clientX <= viewLayout.x + viewLayout.w
      && e.clientY >= viewLayout.y && e.clientY <= viewLayout.y + viewLayout.h;
}
function pressureNow(){
  if (ptr.type === 'touch') return ptr.simP;
  if (ptr.hasForce && performance.now() - ptr.forceT < 3000) return ptr.force;
  return ptr.simP;
}
function readPressure(e){
  if (e.pointerType === 'touch') return;
  if (e.pointerType === 'pen' || (e.pressure > 0 && Math.abs(e.pressure - 0.5) > 0.001)){
    ptr.force = e.pressure; ptr.hasForce = true; ptr.forceT = performance.now();
  }
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  if (ptr.down && e.pointerId !== activePointerId) return;
  activePointerId = e.pointerId;
  canvas.setPointerCapture(e.pointerId);
  const [x, y] = toUv(e);
  ptr.down = true; ptr.tx = x; ptr.ty = y; ptr.bx = x; ptr.by = y;
  ptr.sx = x; ptr.sy = y;
  ptr.type = e.pointerType; ptr.cx = e.clientX; ptr.cy = e.clientY; ptr.inWindow = true;
  ptr.holdStart = performance.now();
  if (sessionState === 'composing') beginTimerPause();
  readPressure(e);
  if (strokes++ === 0) hintEl.classList.add('gone');
});

canvas.addEventListener('pointermove', e => {
  if (ptr.down && e.pointerId !== activePointerId) return;
  const [x, y] = toUv(e);
  ptr.tx = x; ptr.ty = y; ptr.bx = x; ptr.by = y;
  ptr.cx = e.clientX; ptr.cy = e.clientY; ptr.inWindow = true;
  if (!ptr.down) ptr.type = e.pointerType;
  readPressure(e);
  if (appMode === 'communicate' && commAnchor.set){
    drawCommPreview(commAnchor.x, commAnchor.y, x, y);
  }
});

function endStroke(e){
  if (e && e.pointerId !== undefined && activePointerId != null && e.pointerId !== activePointerId) return;
  if (!ptr.down) return;

  if (e && e.clientX != null){
    const [x, y] = toUv(e);
    ptr.bx = x; ptr.by = y;
    ptr.cx = e.clientX; ptr.cy = e.clientY;
  }

  const holdMs = Math.max(0, performance.now() - ptr.holdStart);
  const x = ptr.bx, y = ptr.by;

  if (activePointerId != null){
    try { canvas.releasePointerCapture(activePointerId); } catch {}
  }

  if (sessionState === 'composing'){
    if (appMode === 'communicate'){
      handleCommunicateClick(x, y);
    } else {
      if (depositInkDrop(x, y, holdMs)) flashStatus('ok');
      else flashStatus('no');
    }
  }

  endTimerPause();
  ptr.down = false; ptr.holdStart = 0; activePointerId = null;
}
canvas.addEventListener('pointerup', endStroke);
canvas.addEventListener('pointercancel', endStroke);
window.addEventListener('blur', endStroke);
canvas.addEventListener('pointerleave', () => { ptr.inWindow = false; });
canvas.addEventListener('pointerenter', e => { ptr.inWindow = pointerInCanvas(e); });
window.addEventListener('pointermove', e => {
  if (!ptr.down) ptr.inWindow = pointerInCanvas(e);
}, { passive: true });
canvas.addEventListener('contextmenu', e => e.preventDefault());

function updateCursor(){
  const now = appNow();
  let ringP = 0;
  if (sessionState === 'fixing'){
    ringP = Math.min(1, (now - fixingStartedAt) / FIX_DURATION_MS);
  } else {
    ringP = dryWaitProgress(now);
  }
  cursorEl.style.setProperty('--dry-p', ringP);

  const charging = ptr.down && sessionState === 'composing' && appMode !== 'communicate';
  const holdMs = charging ? performance.now() - ptr.holdStart : 0;
  const charge = charging ? holdDropParams(holdMs) : null;

  if (!ptr.inWindow){ cursorEl.style.opacity = 0; return; }
  const showForTouch = ptr.type === 'touch' && (sessionState === 'fixing' || ringP > 0 || charging);
  if (ptr.type === 'touch' && !showForTouch){ cursorEl.style.opacity = 0; return; }

  cursorEl.style.opacity = 1;
  cursorEl.classList.remove('ink', 'fixing', 'dry-wait', 'charging');
  if (sessionState === 'fixing'){
    cursorEl.classList.add('fixing', 'dry-wait');
    const d = dropCursorPx(PARAMS.dropSizeTap);
    cursorEl.style.width = d + 'px';
    cursorEl.style.height = d + 'px';
    cursorEl.style.removeProperty('--charge-extra');
    cursorEl.style.removeProperty('background');
  } else {
    cursorEl.classList.add('ink');
    if (charging){
      cursorEl.classList.add('charging');
      const d = dropCursorPx(charge.size);
      cursorEl.style.width = d + 'px';
      cursorEl.style.height = d + 'px';
      cursorEl.style.setProperty('--charge-extra', (6 + charge.t * 28) + 'px');
      const fillA = 0.92 - charge.t * 0.42;
      cursorEl.style.background = hexToRgba(peekNextDropColor(), fillA);
      cursorEl.querySelector('.charge-ring').style.opacity = (0.25 + charge.t * 0.55).toFixed(3);
    } else {
      const d = dropCursorPx(PARAMS.dropSizeTap);
      cursorEl.style.width = d + 'px';
      cursorEl.style.height = d + 'px';
      cursorEl.style.removeProperty('--charge-extra');
      cursorEl.style.removeProperty('background');
      cursorEl.querySelector('.charge-ring').style.opacity = '0';
      if (ringP > 0.01 && ringP < 0.999) cursorEl.classList.add('dry-wait');
    }
  }
  cursorEl.style.left = ptr.cx + 'px';
  cursorEl.style.top = ptr.cy + 'px';
}

let lastT = performance.now();
let lastStatusUi = 0;
function frame(now){
  const dt = Math.min((now - lastT) / 1000, 1/30) || 1/60;
  lastT = now;
  if (!simPausedForHold()) step(dt);
  render();
  updateCursor();
  if (simPausedForHold()) updatePhaseUI();
  else if (sessionState === 'composing' && dropCount > 0 && performance.now() - lastStatusUi > 120){
    lastStatusUi = performance.now();
    updatePhaseUI();
  }
  requestAnimationFrame(frame);
}
updatePhaseUI();
requestAnimationFrame(frame);

function updateSwatchUI(){
  swatchEls.forEach((el, i) => {
    const on = enabledColors.includes(i);
    el.classList.toggle('on', on);
    el.setAttribute('aria-pressed', on ? 'true' : 'false');
  });
}
function toggleColor(idx){
  const pos = enabledColors.indexOf(idx);
  if (pos >= 0){
    if (enabledColors.length <= 1) return;
    enabledColors.splice(pos, 1);
  } else {
    enabledColors.push(idx);
    enabledColors.sort((a,b) => a - b);
  }
  updateSwatchUI();
  updatePhaseUI();
}

const GROUP_ORDER = ['paramTap', 'paramHold', 'paramDebug', 'paramCanvas', 'paramWater', 'paramInk', 'paramSim'];

const GROUP_TITLES = {
  create: { paramTap: 'Tap', paramHold: 'Full hold', paramDebug: 'Debug',
    paramCanvas: 'Canvas', paramWater: 'Water', paramInk: 'Ink drop', paramSim: 'Simulation' },
  communicate: { paramTap: 'Line', paramDebug: 'Debug', paramCanvas: 'Canvas',
    paramWater: 'Flow', paramSim: 'Simulation' },
};

function paramStoreFor(def){
  return def.store === 'comm' ? COMM_PARAMS : PARAMS;
}

function bindParamInput(def, input){
  const store = paramStoreFor(def);
  const apply = () => {
    const v = parseFloat(input.value);
    if (!Number.isFinite(v)) return;
    store[def.key] = v;
    if (def.onApply) def.onApply();
  };
  input.addEventListener('input', apply);
  input.addEventListener('change', apply);
}

function addCheckboxRow(group, key, label, help, store){
  const row = document.createElement('div');
  row.className = 'param-row param-check';
  const id = 'p_' + key;
  row.innerHTML = '<label for="' + id + '"><input type="checkbox" id="' + id + '"> ' + label + '</label>'
    + '<div class="help">' + help + '</div>';
  document.getElementById(group).appendChild(row);
  const box = document.getElementById(id);
  box.checked = store[key] > 0.5;
  box.addEventListener('change', e => { store[key] = e.target.checked ? 1 : 0; });
}

function renderParamPanel(mode){
  const defs = mode === 'communicate' ? COMM_PARAM_DEFS : PARAM_DEFS;
  const titles = GROUP_TITLES[mode] || GROUP_TITLES.create;
  for (const g of GROUP_ORDER) document.getElementById(g).innerHTML = '';
  const used = new Set(defs.map(d => d.group));
  for (const g of GROUP_ORDER){
    if (used.has(g) && titles[g]){
      document.getElementById(g).innerHTML = '<h3>' + titles[g] + '</h3>';
    }
  }
  defs.forEach(def => {
    const row = document.createElement('div');
    row.className = 'param-row';
    const id = 'p_' + def.key;
    const input = document.createElement('input');
    input.type = 'number';
    input.id = id;
    input.step = def.step;
    input.value = paramStoreFor(def)[def.key];
    row.innerHTML = '<label for="' + id + '">' + def.label + '</label>';
    row.appendChild(input);
    const help = document.createElement('div');
    help.className = 'help';
    help.textContent = def.help;
    row.appendChild(help);
    document.getElementById(def.group).appendChild(row);
    bindParamInput(def, input);
  });
  if (mode === 'communicate'){
    addCheckboxRow('paramWater', 'flowGrow', 'Flow grows toward B',
      'Scale flow speed up from A to B (more push at the end).', COMM_PARAMS);
    addCheckboxRow('paramSim', 'paperTexture', 'Paper texture',
      'Show paper scan on canvas. Ink always follows paper grain (displacement).', PARAMS);
  } else {
    addCheckboxRow('paramSim', 'paperTexture', 'Paper texture',
      'Show paper scan on canvas. Ink always follows paper grain (displacement).', PARAMS);
  }
}

function applyParamsToUI(){
  renderParamPanel(appMode);
}

renderParamPanel(appMode);

function toggleParams(){
  paramsEl.classList.toggle('show');
  paramsEl.setAttribute('aria-hidden', paramsEl.classList.contains('show') ? 'false' : 'true');
}

document.getElementById('bClear').addEventListener('click', clearAll);
document.getElementById('bSetDefault').addEventListener('click', () => {
  if (appMode === 'communicate') saveCommDevParams();
  else saveDevParams();
  flashStatus('ok');
});
document.getElementById('bSave').addEventListener('click', () => {
  render();
  canvas.toBlob(b => {
    if (!b) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b);
    a.download = 'inktool-' + new Date().toISOString().replace(/[:.]/g,'-').slice(0,19) + '.png';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 4000);
  });
});

window.addEventListener('keydown', e => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.key === 'p') toggleParams();
  if (e.key === 'x') clearAll();
  if (e.key === 's') document.getElementById('bSave').click();
});

})();
</script>
